<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>Wizanesat IPTV - Realtime Mode</title>
</head>
<body>
    <button id="loginBtn">تسجيل الدخول بجوجل</button>
    <div id="userArea" style="display:none">
        <p id="userName"></p>
        <button onclick="createOrder()">شراء باقة تجريبية</button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, GoogleAuthProvider, signInWithPopup, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        // استيراد Realtime Database
        import { getDatabase, ref, push, set } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
    apiKey: "AIzaSyCdoquNPVZIl8hvmCn8g6LM2DStQjD-8ac",
    authDomain: "wizanesat-iptv-b7d4c.firebaseapp.com",
    // الصق الرابط الذي نسخته هنا بالأسفل
    databaseURL: "https://wsiptv-db-default-rtdb.europe-west1.firebasedatabase.app", 
    projectId: "wizanesat-iptv-b7d4c",
    storageBucket: "wizanesat-iptv-b7d4c.firebasestorage.app",
    messagingSenderId: "102150577326",
    appId: "1:102150577326:web:0f8a5391559acdade5e13f"
};

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getDatabase(app); // تعريف قاعدة البيانات الجديدة
        const provider = new GoogleAuthProvider();

        // الدخول
        document.getElementById('loginBtn').onclick = () => signInWithPopup(auth, provider);

        // مراقبة الحالة
        onAuthStateChanged(auth, (user) => {
            if (user) {
                document.getElementById('loginBtn').style.display = "none";
                document.getElementById('userArea').style.display = "block";
                document.getElementById('userName').innerText = "مرحباً: " + user.displayName;
            }
        });

        // إنشاء طلب في Realtime Database
        window.createOrder = async () => {
            const userId = auth.currentUser.uid;
            // إنشاء مرجع جديد (مثل ID تلقائي)
            const ordersRef = ref(db, 'orders/' + userId);
            const newOrderRef = push(ordersRef); 

            try {
                await set(newOrderRef, {
                    email: auth.currentUser.email,
                    package: "باقة 3 أشهر",
                    amount: 1200,
                    status: "pending",
                    timestamp: Date.now()
                });
                alert("نجحت العملية! تم تسجيل الطلب في Realtime Database");
            } catch (error) {
                console.error(error);
                alert("فشل: " + error.message);
            }
        };
    </script>
</body>
</html>
